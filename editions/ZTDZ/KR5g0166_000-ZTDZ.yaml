body:
  text: 上清髙上滅魔洞景金元玉清隱書經承三太微天帝君閒居於明霞之上瓊闕之内金華之房合變冥樞蕭朗上契曲寢瑶室時宴龍山清齋三年乃命太素三元上皇五賢之賔檄落萬靈理召千眞九天齊陳八帝停輪披朱見於玉戶隂甲列於瓊門爰有九皇上眞上元禁君超玉虚之天啓五眞之房帶逸録之符乘三素之軿上詣玉清太微天帝君顯靈蓋而後乘焉是時玄始暎朗天元敷陳河海靜波八風散煙慶雲接於龍軒景浮揚於九玄金仙秉越大帥仗幡天丁前驅髙鋒厲天九靈啓路四明扶輪飛旌萬塗羅騎億千躑躅於瓊闕之下揚華於明霞之巔靈儀闡備莫不畢陳於是太微天帝君方復曲宴瓊室重誦洞章歌紫虚之靈辭琅微音於七玄于時乃命太微上眞勑使羣靈整甲齊鋒乃豋八瓊玉輦駕玄景之暉太霞部靈引日俠月七晨合明王星驅除火甲揚精八素啓輿元剛衛兵羽蓋停空萬騎相傾毒龍翼軒飛煙繞軿戴玄上之華幡煥流金之火鈴五霞陳曜六度休明撫九華之鳴鐘打碧鼓之玄英撞金折玉叩璈拍瓊龍吟虎嘯鸞舞鳯鳴八音同和萬律齊聲雲璈絶玄天女羅筝法響時奏續節上呈天鈞四陳廣樂虚庭神虎仰號天獸羅兵逆鱗四喉振豪奮形銜刀割魔揮劒捕靈伺六天之凶夫斬山嶽之邪精羽騎浮空神鋒曜明揮輪玉字揚華上清望雲景而徊輦逐傾蓋於霞城旣至良乆於是上皇玉帝君乃命玄羽玉郎太保眞人出迎太微天帝君徐引使前遂盻於瓊房焉太微天帝君乃稽首伏於窻軒之下進拜於帝皇之机憑瓊顔而妙感仰靈眸而陳辭曰賤臣幸化重悟凝玄得司帝位領括羣眞浪虚津於七覺遂鳴玉於霄上希清玄之神塗想玉虚之神王實亦妙眇於玄流奏冥心於遐方而天尊髙秀靈蓋顯照垂觀下流巳弘大恩矣於是上皇玉帝君乃推机偃詠虚眺太空吟玉清之隱書歌元景之靈章玉音遐璨清微琅振其辭曰上景發晨暉金霄鬱紫清三素曜瓊扉玄上昭虚靈手掇青林華廻蓋太无庭寢宴頥緑房飛歩秀玉京提携朱景玉長煙亂虚營玄歸自可保何以怨无生四王宅誰身變分豈一形欻欻推妙品混爾至氣明於是玉帝吟歌畢乃命太微天帝君使坐引萬靈於房軒散華香於玉宇陳天鈞之廣樂響靈音於八海振冥波於天外鼓扇乘風千神羽衛方酌玉爵盻於瓊華之房九英穕薦素實丹方隱芝結饌鳯爼月漿玉攝重奏玄羽運觴流連於八瓊之室曲宴於九琳之堂於是上皇玉帝君方凝神遐想髙詠絶玄忽然而歎曰上契玄範通逹冲微亦深矣哉子旣司帝位受事玉虚飛仙朝於金闕四明輔於輪側遐盻空山領括天嶽應和絶唱攄讃妙慧誠宜極觀幽文冲契上法髙㑹秀感其勉之乎乃命上皇太老眞人開瓊珠之篋出玉清隱書隱玄羽經以傳太微天帝君於是帝君下席稽辭於上皇之前再拜受書出付太微上眞羽玄玉郎以授諸上清眞人及太素三元髙上玉賢之賔又帝君領括衆天試觀十方諸有宿命之人眞仙之㑹及有帝簡金書百玉録籍之名者乃得授傳之耳侍書玉童玉女各四十五人主司有經者之身糺罪於司命紀過於三元宻愼者則享福漏泄者則禍纒苦樂立應於七祖罪福交㑹於當年三天司察奏之帝君書罪録過无不上聞善惡違情可不愼焉上皇玉慧玉清隱書者乃髙上之訣辭玉帝之靈章也一名洞景金玄隱玄羽經玉帝君藏經於景雲之闕瓊霞之房封以丹蘂之篋閟以雲錦之囊主以太老上眞侍以玄景玉童使七百年中得傳三人自非眞仙之名帝圖玉録者不得聞見此經得見之者飛仙上清傳授之法皆五老授圖太一試觀故能攝生十方領㑹洞天啓誓丹青㰱血爲盟先齋七百日然後傳之盟用青錦三十尺金環兩𩀱所以重誓冥科崇約帝君上豋玉清累祖胎仙漏泄寳文七世被殃繫魂鬼於死戶之下伐年命於五道之津三官考毒巳無仙冀切身殊於水火嶮巇過於履冰可不慎哉可不慎哉玉清隱書金玄羽經皆虚皇之寳書玉帝所祕藏三天司察糺諸違慢之罪兆豋齋之日侍經玉童玉女上聞帝君靈音旣震則太一鑒試帝尊下觀太老侍側羽仙司眞矣兆當清齋入室淨服燒香唯精唯專然後乃十轉誦經耳洞景金玄玉清隱書玄玄虚上四靈敷篇玉慧散魔六度休陳髙㑹三元朝宴九眞萬靈受事玉帝隱玄九和百㑹叅乘法輪流浪髙軒立景上元道逵无方體一凝神冲化合變七道齊分保生玉清逍遥虚津隂察萬兆括領洞天巍巍徳宇峩峩髙尊𩀱景翼靈四暎二玄玉道交煥萬範流全周落天度七變九旋觀化太空飛歩玉宸清波逺鏡道悟上眞精微太虚髙唱絶玄於是八素同期俱朝玉清檄命太微徴召萬靈三元奏簡五老㑹庭髙眞森羅金仙殊形羽裙玉袂錦帔流鈴緑霞被素玉室發精音響太和萬唱絶冥靈光八暉七氣混生公子合變帝一凝形妙詠神慧玉道隱經靈音瓊散玄響續呈五皇命駕髙秀皇庭玄上招仙玉帝之旌五嶽神王輔輪四明二道方塗理㑹上仙洞天髙觀妙景雲京天扉廓散靈禁開明騰舞太无七神常生𩀱宴空洞遊夢上清精感逺暢道合无名十絶交和二象虚停攝元理氣萬化渾成録簡雲房寳籍髙靈澄神紫虚命胡可傾或乃神元妙接逸觀常流四玄總暎飛光電幽日華𩀱運紫庭照軀道悟上眞七靈同符神機頴速八皇定書名奏帝堂羽籍太无身宴録房飛行玉虚南宫受仙七元反胎寢暎髙瓊變升神衢霄歌玄唱帝賔同居保兹玄歸丹皇運珠上一赤子凝天伯无妙眇雲景鬱鬱雲丘手排金扉身荷玉符朱霄霞煥八光仰投體矯冥眞攝生萬流保景金晨長宴玉州於是罪滅三塗靈吹九辰納眞紫房五皇𢹂仙保㑹絳宫逸宅丹玄十轉五廻靈震萬原香風八披惡魔絶煙萬萬千千來對帝前仙皇告符道逵三眞瓊音上充七世无間令我飛仙名遷玉門三氣纒綿九䰟巳分帝一變景萬化亦臻七度上徊三光暎眞對滅五道伐破胞根𩀱皇俠守把符十玄玉籍已明福盈龍泉陵梵履昌五氣合延叅乗太一同昇帝軒并命公子奉籍七神黄録刻名握節上遷飛暎玉華煥落靈元滅魔散禍長閉帝宫玄氣四霏大混虚冲靈飛外輔六丁注中雲行雨施流布三宫九皇下視上䇿隱龍月母同軒徊蓋帝墉披朱巾羽鳴鈴華峯越出地戸泉曲之梁五老合符徊金帝郷俱過水火混一紫房七開受仙朝㑹玉堂九曜同生五華運光八氣慶合十絶牢張上帝歡熈玄母常康九靈同期左弼右卿太无結暉萬氣混并上豋洞房徊合玉清神風扇扉紫霞緑經鬱洞靈機九和百明神對金霄逸羽龍京景福萬塗七祖順生各保南仙莫不胎嬰九合三離素華繞形福景日王併羽月靈太一召魔九天校精㧞廻死積越度仙庭司命奏籍帝一混并三元把符七神虚營穢氣紛紛血尸沉零絶根反胎萬氣以成太素録圖金仙同軿大福纒綿累支同榮寳藏秀華三關霄清白氣徘徊凝鬱珠瓊飛浪玉晨長保劫齡五暉纒曜七門受明神符散慧理氣攝靈右徊洞陽左𢹂无英公子奉籍内守桃康玄母抱圖五神黄寧胞根八解皇老刻名九結披散五毒攝精㧞出三界反胎仙庭七元解羅累祖受生寳録太无俱濟神營六府煥爽金書羽經世爲眞仙披落錦青帝師纒綿合景玉清散香龍窻玄合五城足躡景衢手排四明八暉九錬飛歩雲京領㑹六淵刻名八瓊五通七合三氣乃并萬條重華世保仙靈把持玉符身昇羽庭徊風合化玉帝隱經長契壹運上願必成受帝之恩上朝玉清玉清隱書隱玄羽經一名洞景金玄玉帝所祕藏修此之法當先行大混百神變化雌雄及帝一上道然後乃得續行之耳此之靈章帝皇之寶篇解七祖之𠎝結保萬神於胎元攝生道於十方振靈音以上充萬徧旣周則身耀金晨爾乃靈霞妙感俯徊雲輪鳴鈴太霄列位上眞所以俯仰殊格未行其重故也當以本命之日清齋入室燒香左右北面再拜乃心存於玉帝瓊元君求得解七玄之愆乞已神仙畢平坐誦經誦經三徧輙一過讀髙上滅魔玉帝神慧是夕當十轉隱經四讀帝慧也讀畢乃臨目内視夷神平氣坐卧隨意當叩齒三十通而微祝曰五帝大慧是謂隱玄十轉四廻滅魔召眞七靈同期大混五神瓊音八震上元七玄玄風散扉扇伐胞根長保胎嬰世受眞仙上昇上清玉帝之軒畢又叩齒三十通咽液十過於是百神並㑹五藏夷平帝君歡熈太一保生體清氣固魂柔魄寧司命定録皇老書名人无哭已飛輪玉清胞結解散八暉同形大福纒綿七玄同榮十轉旣竟心拜四方所以尊妙髙靈也長齋之士絶交人事體清服潔隱靜别處亦可日曰誦習或可甲子之日及諸八節之日此皆上元朝宴之時不必須待本命日爾乃行事也夫十轉隱經之時皆太一監察司命定生萬靈混合帝君凝形三宫㑹眞九房受靈是其夕也當有玄感妙應靈瑞吉祥然後八素鬱軀三元授眞也夫修此之道惟使精專存眞念氣心誠苦宻憂樂轗軻不忘於至道然後冥感易㑹法輪速昇晨豋太霄飛行隂房矣若乃情散萬念精誠不固形屍穢濁心无至慕犯慢靈禁動違科素者則帝君糺其罪禍敗纏其軀已身无仙冀七玄更被囚魂鬼入風火年劫增其尤奉禁者靈仙犯違者身誅也道士體不平和覺疾病之處可隱靜別室啓乞神明求得解脫愆羅及七玄之罪聽得轉經存念眞氣禮祝如法施行都畢乃靜身安寢自然魂胎内固三關受靈邪毒散出體夷氣平旣悟之後覺身體康寧都无復痾疾矣若他人疾病有諸急難之地皆聽爲轉經當先啓告神靈北向再拜說某名字於玉清瓊元君求得上解某愆及七祖之罪濟生十方身勉八難然後燒香隱誦祝請如法大福皆應身豋齋入室七日轉經名曰大混百神朝㑹帝一解愆脫羅攝生濟厄无不受恩此玉帝上法不可輕履屍穢及干冒淹濁三天察過罪同漏泄愼之愼之上清髙上滅魔洞景金元玉清隱書經
